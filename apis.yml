    name: Kaiser Permanente Patient Access FHIR API
    description: >-
      Kaiser Permanente provides a patient access FHIR API supporting the CMS
      Interoperability and Patient Access Final Rule. Authenticated members and
      their authorized third-party applications can retrieve clinical and
      claims data (encounters, conditions, medications, observations, allergies,
      coverage) through standards-based FHIR resources.
